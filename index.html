<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Assistant D&D 5e — Thork</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1208">
<meta name="description" content="Assistant de personnage Donjons & Dragons 5e (2024)">

<!-- iOS Safari standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=IM+Fell+English:ital@0;1&family=MedievalSharp&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    /* === BACKDROP === */
    --bg-deep:        #08060a;
    --bg-base:        #15110d;
    --bg-card-dark:   #1f1810;
    --bg-card-darker: #120c08;
    /* === PARCHMENT === */
    --parchment:        #f1e4c1;
    --parchment-warm:   #ead7a3;
    --parchment-edge:   #c9b27c;
    --parchment-shadow: #8b7440;
    /* === GOLD === */
    --gold-light:   #f0d480;
    --gold:         #d4a857;
    --gold-mid:     #b88a3a;
    --gold-deep:    #8a6420;
    --gold-shadow:  #4a3210;
    /* === INK === */
    --ink:        #1c130a;
    --ink-soft:   #4a3520;
    --ink-faint:  #6e5a3a;
    /* === WAX RED === */
    --wax:        #8e1818;
    --wax-bright: #b62828;
    --wax-deep:   #5e0e0e;
    --wax-glow:   rgba(182, 40, 40, 0.5);
    /* === LEAF GREEN === */
    --leaf:        #4a7a3a;
    --leaf-bright: #6c9c50;
    --leaf-deep:   #2c4a20;
    /* === STEEL === */
    --steel:        #2a3340;
    --steel-bright: #44546a;
    --steel-deep:   #161b22;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'IM Fell English', 'Georgia', serif;
    color: #e8dcc0;
    margin: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,168,87,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 100% 100%, rgba(142,24,24,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 0% 0%, rgba(74,122,58,0.04) 0%, transparent 60%),
      linear-gradient(160deg, #0a0805 0%, #15110d 50%, #0e0a06 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* Subtle ambient noise + filigree texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.08;
    background-image:
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='280' height='280' viewBox='0 0 280 280'%3E%3Cdefs%3E%3Cpattern id='p' x='0' y='0' width='140' height='140' patternUnits='userSpaceOnUse'%3E%3Cpath d='M70 10 C90 30, 90 50, 70 70 C50 50, 50 30, 70 10 Z M70 70 C90 90, 90 110, 70 130 C50 110, 50 90, 70 70 Z' fill='none' stroke='%23d4a857' stroke-width='0.6'/%3E%3Ccircle cx='70' cy='70' r='2' fill='%23d4a857'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23p)'/%3E%3C/svg%3E");
  }

  #root { position: relative; z-index: 1; }

  /* === FONTS === */
  h1, h2, h3, h4, .cinzel { font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
  .imfell { font-family: 'IM Fell English', serif; }
  .smallcaps { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.78em; }

  /* === COLOR UTILITIES (kept compatible with existing JSX) === */
  .ink   { color: var(--ink); }
  .ink\/80 { color: var(--ink-soft); }
  .gold  { color: var(--gold-light); }
  .blood { color: var(--wax-bright); }

  /* === PARCHMENT PANEL === */
  .parchment {
    position: relative;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 22% 18%, #fbf2d6 0%, transparent 55%),
      radial-gradient(ellipse at 80% 88%, #e9d5a2 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, #f1e4c1 0%, #ddc78a 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 10px;
    box-shadow:
      inset 0 0 30px rgba(139,111,58,0.20),
      inset 0 0 0 1px rgba(255,245,210,0.45),
      inset 0 0 0 3px rgba(212,168,87,0.10),
      0 10px 26px rgba(0,0,0,0.55),
      0 2px 0 rgba(212,168,87,0.18);
  }
  /* Decorative double border via pseudo */
  .parchment::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(138, 100, 32, 0.45);
    border-radius: 6px;
    pointer-events: none;
  }
  .parchment::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    background:
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='52' height='52' viewBox='0 0 52 52'%3E%3Cpath d='M2 14 C2 6, 6 2, 14 2 M50 14 C50 6, 46 2, 38 2 M2 38 C2 46, 6 50, 14 50 M50 38 C50 46, 46 50, 38 50' fill='none' stroke='%238a6420' stroke-width='1.2' opacity='0.65'/%3E%3Cpath d='M14 2 L18 2 M2 14 L2 18 M38 2 L34 2 M50 14 L50 18 M14 50 L18 50 M2 38 L2 34 M38 50 L34 50 M50 38 L50 34' stroke='%238a6420' stroke-width='1' opacity='0.5'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='8' cy='44' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='44' r='1.5' fill='%23d4a857'/%3E%3C/svg%3E") top left no-repeat,
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='52' height='52' viewBox='0 0 52 52'%3E%3Cpath d='M2 14 C2 6, 6 2, 14 2 M50 14 C50 6, 46 2, 38 2 M2 38 C2 46, 6 50, 14 50 M50 38 C50 46, 46 50, 38 50' fill='none' stroke='%238a6420' stroke-width='1.2' opacity='0.65'/%3E%3Cpath d='M14 2 L18 2 M2 14 L2 18 M38 2 L34 2 M50 14 L50 18 M14 50 L18 50 M2 38 L2 34 M38 50 L34 50 M50 38 L50 34' stroke='%238a6420' stroke-width='1' opacity='0.5'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='8' cy='44' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='44' r='1.5' fill='%23d4a857'/%3E%3C/svg%3E") top right no-repeat,
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='52' height='52' viewBox='0 0 52 52'%3E%3Cpath d='M2 14 C2 6, 6 2, 14 2 M50 14 C50 6, 46 2, 38 2 M2 38 C2 46, 6 50, 14 50 M50 38 C50 46, 46 50, 38 50' fill='none' stroke='%238a6420' stroke-width='1.2' opacity='0.65'/%3E%3Cpath d='M14 2 L18 2 M2 14 L2 18 M38 2 L34 2 M50 14 L50 18 M14 50 L18 50 M2 38 L2 34 M38 50 L34 50 M50 38 L50 34' stroke='%238a6420' stroke-width='1' opacity='0.5'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='8' cy='44' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='44' r='1.5' fill='%23d4a857'/%3E%3C/svg%3E") bottom left no-repeat,
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='52' height='52' viewBox='0 0 52 52'%3E%3Cpath d='M2 14 C2 6, 6 2, 14 2 M50 14 C50 6, 46 2, 38 2 M2 38 C2 46, 6 50, 14 50 M50 38 C50 46, 46 50, 38 50' fill='none' stroke='%238a6420' stroke-width='1.2' opacity='0.65'/%3E%3Cpath d='M14 2 L18 2 M2 14 L2 18 M38 2 L34 2 M50 14 L50 18 M14 50 L18 50 M2 38 L2 34 M38 50 L34 50 M50 38 L50 34' stroke='%238a6420' stroke-width='1' opacity='0.5'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='8' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='8' cy='44' r='1.5' fill='%23d4a857'/%3E%3Ccircle cx='44' cy='44' r='1.5' fill='%23d4a857'/%3E%3C/svg%3E") bottom right no-repeat;
    background-size: 52px 52px;
  }
  .parchment > * { position: relative; z-index: 1; }

  /* Section title with side flourishes */
  .section-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    padding: 6px 0 10px;
    margin-bottom: 12px;
    position: relative;
  }
  .section-title::before, .section-title::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 26%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-mid) 20%, var(--gold-mid) 80%, transparent);
  }
  .section-title::before { left: 4%; }
  .section-title::after  { right: 4%; }

  /* === STAT SHIELD (small box) === */
  .stat-box {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 28%, #fbf2d6 0%, #ead7a3 60%, #d6bf80 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 8px;
    color: var(--ink);
    box-shadow:
      inset 0 0 0 1px rgba(255,245,210,0.55),
      inset 0 0 12px rgba(184,138,58,0.25),
      0 2px 6px rgba(0,0,0,0.4);
  }
  .stat-box::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(138,100,32,0.35);
    border-radius: 5px;
    pointer-events: none;
  }
  .stat-box > * { position: relative; z-index: 1; }

  /* === BUTTONS === */
  .dnd-btn {
    --btn-grad-from: #2a2a30;
    --btn-grad-to:   #14141a;
    --btn-color:     var(--gold-light);
    --btn-border:    var(--gold-deep);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--btn-color);
    background:
      linear-gradient(180deg, var(--btn-grad-from) 0%, var(--btn-grad-to) 100%);
    border: 1px solid var(--btn-border);
    border-radius: 5px;
    cursor: pointer;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
    transition: filter 0.15s ease, transform 0.05s ease, box-shadow 0.15s;
    box-shadow:
      inset 0 1px 0 rgba(240,212,128,0.30),
      inset 0 -2px 4px rgba(0,0,0,0.45),
      0 2px 4px rgba(0,0,0,0.50);
  }
  .dnd-btn:hover { filter: brightness(1.18); box-shadow: inset 0 1px 0 rgba(240,212,128,0.40), inset 0 -2px 4px rgba(0,0,0,0.45), 0 0 12px rgba(212,168,87,0.30), 0 2px 4px rgba(0,0,0,0.50); }
  .dnd-btn:active { transform: translateY(1px); }
  .dnd-btn:disabled { filter: grayscale(0.5) brightness(0.6); cursor: not-allowed; }

  /* Variant: red wax (primary action) */
  .dnd-btn-danger,
  .dnd-btn.dnd-btn-danger {
    --btn-grad-from: #b62828;
    --btn-grad-to:   #5e0e0e;
    --btn-color: #f5e9c8;
    --btn-border: var(--gold-deep);
  }
  .dnd-btn-danger:hover { box-shadow: inset 0 1px 0 rgba(255,200,180,0.45), inset 0 -2px 4px rgba(0,0,0,0.45), 0 0 14px var(--wax-glow), 0 2px 4px rgba(0,0,0,0.50); }

  /* Variant: gold (positive secondary) */
  .dnd-btn-gold {
    --btn-grad-from: #e0b865;
    --btn-grad-to:   #8a6420;
    --btn-color: var(--ink);
    --btn-border: #5a4015;
  }

  /* Variant: leaf (positive) */
  .dnd-btn-leaf {
    --btn-grad-from: #6c9c50;
    --btn-grad-to:   #2c4a20;
    --btn-color: #f5e9c8;
  }

  /* === TABS — ribbon style === */
  .tabbar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 8px;
    margin-top: 4px;
    background:
      linear-gradient(180deg, rgba(31,24,16,0.85) 0%, rgba(15,12,8,0.85) 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 8px;
    box-shadow:
      inset 0 1px 0 rgba(212,168,87,0.15),
      inset 0 -1px 2px rgba(0,0,0,0.5),
      0 4px 10px rgba(0,0,0,0.45);
  }
  .tab-btn {
    position: relative;
    background: transparent;
    color: var(--gold);
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 7px 13px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover {
    color: var(--gold-light);
    background: rgba(212,168,87,0.08);
  }
  .tab-btn.active {
    color: var(--gold-light);
    background: linear-gradient(180deg, rgba(212,168,87,0.18) 0%, rgba(212,168,87,0.05) 100%);
    border-color: rgba(212,168,87,0.4);
    box-shadow: inset 0 1px 0 rgba(240,212,128,0.25);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    left: 18%;
    right: 18%;
    bottom: -2px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    box-shadow: 0 0 8px rgba(240,212,128,0.6);
  }

  /* === INPUTS === */
  .input-dnd {
    background:
      linear-gradient(180deg, rgba(255,248,220,0.78) 0%, rgba(240,228,193,0.85) 100%);
    border: 1px solid var(--gold-deep);
    color: var(--ink);
    border-radius: 4px;
    padding: 5px 9px;
    font-family: 'IM Fell English', serif;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.18),
      inset 0 0 0 1px rgba(255,255,255,0.30);
  }
  .input-dnd:focus {
    outline: none;
    border-color: var(--gold-light);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.18),
      0 0 0 2px rgba(240,212,128,0.40);
  }
  textarea.input-dnd { resize: vertical; min-height: 38px; }
  select.input-dnd {
    appearance: none;
    -webkit-appearance: none;
    padding-right: 28px;
    background-image:
      linear-gradient(180deg, rgba(255,248,220,0.78) 0%, rgba(240,228,193,0.85) 100%),
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14'%3E%3Cpath d='M3 5 L7 10 L11 5' fill='none' stroke='%238a6420' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-position: right 0 top 0, right 8px center;
    background-repeat: no-repeat;
    background-size: 100% 100%, 14px 14px;
  }
  input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--gold-deep);
    border-radius: 3px;
    background: linear-gradient(180deg, #fbf2d6 0%, #d6bf80 100%);
    cursor: pointer;
    position: relative;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.15);
  }
  input[type="checkbox"]:checked {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    border-color: var(--gold-shadow);
  }
  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 4px; height: 9px;
    border: solid var(--ink);
    border-width: 0 2px 2px 0;
    transform: rotate(40deg);
  }
  input[type="checkbox"]:disabled { opacity: 0.6; cursor: not-allowed; }

  /* === SCROLLBAR === */
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: rgba(0,0,0,0.25); border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    border-radius: 4px;
    border: 1px solid var(--gold-shadow);
  }

  /* === PIPS (slots, charges) === */
  .slot-pip {
    width: 20px; height: 20px;
    border: 2px solid var(--gold-deep);
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, #fff8de 0%, #ead7a3 50%, #b88a3a 100%);
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: inset 0 0 4px rgba(138,100,32,0.4), 0 1px 2px rgba(0,0,0,0.4);
  }
  .slot-pip:hover { transform: scale(1.15); box-shadow: 0 0 8px rgba(240,212,128,0.5); }
  .slot-pip.used {
    background:
      radial-gradient(circle at 30% 30%, #5a0808 0%, #2a0404 80%);
    border-color: #4a0808;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.7);
  }
  .death-pip {
    width: 18px; height: 18px;
    border: 2px solid var(--gold-deep);
    border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #fbf2d6 0%, #d6bf80 100%);
    transition: all 0.15s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .death-pip.success {
    background: radial-gradient(circle at 30% 30%, #6cb44a 0%, #2c4a20 100%);
    border-color: #2a4015;
  }
  .death-pip.failure {
    background: radial-gradient(circle at 30% 30%, #c43030 0%, #5e0e0e 100%);
    border-color: #4a0808;
  }

  /* === INSPIRATION (wax-seal-like) === */
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 8px rgba(212,168,87,0.4), inset 0 0 8px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 0 18px rgba(240,212,128,0.85), 0 0 30px rgba(212,168,87,0.4), inset 0 0 8px rgba(0,0,0,0.4); }
  }
  .glowing { animation: glow 2.4s infinite ease-in-out; }

  /* === PROGRESS BAR === */
  .progress-track {
    position: relative;
    height: 18px;
    background:
      linear-gradient(180deg, #1a120a 0%, #0a0604 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(212,168,87,0.18),
      0 1px 2px rgba(0,0,0,0.4);
  }
  .progress-fill-hp {
    height: 100%;
    background:
      linear-gradient(180deg, #d83838 0%, #8e1818 50%, #5e0e0e 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,200,200,0.30),
      inset 0 -2px 4px rgba(0,0,0,0.40);
    transition: width 0.5s ease;
  }
  .progress-fill-hp.low { background: linear-gradient(180deg, #d8a838 0%, #8a6418 50%, #5a4010 100%); }
  .progress-fill-hp.crit { background: linear-gradient(180deg, #ff4040 0%, #b01818 50%, #6e0c0c 100%); animation: pulse-crit 1.4s infinite; }
  @keyframes pulse-crit { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.4); } }

  /* === DETAILS / SUMMARY === */
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }

  /* === DIVIDER === */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-mid) 50%, transparent);
    margin: 12px 0;
    position: relative;
  }
  .divider::after {
    content: '✦';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold-mid);
    background: var(--parchment-warm);
    padding: 0 8px;
    font-size: 10px;
  }

  /* === CARD HOVER === */
  .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
  .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,168,87,0.3); }

  /* === BADGES === */
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 26px;
    padding: 0 8px;

// Persistance
const STORAGE_KEY = 'dnd2024-character-v3';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) { console.warn('load err', e); }
  return null;
}

function saveState(s) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch(e) { console.warn('save err', e); }
}

function App() {
  const [state, setState] = useState(() => {
    const loaded = loadState();
    const def = defaultCharacter();
    if (!loaded) return def;
    // Migration : on fusionne les défauts avec les données sauvegardées
    // pour ne pas perdre les nouveaux champs (ex : bonus_caracs)
    const merged = { ...def, ...loaded };
    // Fusion profonde pour bonus_caracs
    merged.bonus_caracs = { ...def.bonus_caracs, ...(loaded.bonus_caracs||{}) };
    return merged;
  });
  const [tab, setTab] = useState('fiche');
  const [sorts] = useState(() => window.__SORTS_DATA__ || []);

  useEffect(() => { saveState(state); }, [state]);

  const update = useCallback((patch) => {
    setState(s => ({ ...s, ...(typeof patch === 'function' ? patch(s) : patch) }));
  }, []);

  const classe = CLASSES[state.classe] || CLASSES.guerrier;
  const espece = ESPECES[state.espece] || ESPECES.humain;
  const histo = HISTORIQUES[state.historique] || HISTORIQUES.soldat;
  const prof = PROF_BY_LEVEL[state.niveau] || 2;
  const caracSort = state.sorts_caracteristique_override || classe.carac_sort;

  return (
    <div className="max-w-7xl mx-auto p-3 md:p-6">
      <Header state={state} update={update} classe={classe} espece={espece} prof={prof} />
      <Tabs tab={tab} setTab={setTab} hasSpells={!!classe.carac_sort || !!state.sorts_caracteristique_override} />
      <div className="mt-4">
        {tab === 'fiche' && <Fiche state={state} update={update} classe={classe} espece={espece} histo={histo} prof={prof} />}
        {tab === 'tracker' && <Tracker state={state} update={update} classe={classe} prof={prof} />}
        {tab === 'sorts' && <Sorts state={state} update={update} classe={classe} prof={prof} sortsDB={sorts} caracSort={caracSort} />}
        {tab === 'inventaire' && <Inventaire state={state} update={update} prof={prof} />}
        {tab === 'niveau' && <LevelUp state={state} update={update} classe={classe} />}
        {tab === 'capacites' && <Capacites state={state} update={update} classe={classe} espece={espece} histo={histo} />}
        {tab === 'notes' && <Notes state={state} update={update} />}
        {tab === 'reglages' && <Reglages state={state} update={update} setState={setState} />}
      </div>
      <Footer />
    </div>
  );
}

function Header({ state, update, classe, espece, prof }) {

    <div className="parchment rounded-xl p-4 md:p-6 mb-3 relative">
      <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div className="flex items-center gap-4 flex-1 min-w-0">
          {/* Ornament (sigil) */}
          <div className="hidden md:flex flex-col items-center gap-1 shrink-0">
            <div className="wax-seal" title={classe.nom}>
              {classe.nom.slice(0,1)}
            </div>
            <div className="smallcaps ink-faint" style={{color:'var(--ink-soft)', fontSize:'9px'}}>{classe.nom}</div>
          </div>
          <div className="flex-1 min-w-0">
            <input
              value={state.nom}
              onChange={e=>update({nom:e.target.value})}
              className="cinzel text-3xl md:text-5xl font-black bg-transparent border-b border-transparent hover:border-amber-700/40 w-full focus:outline-none focus:border-amber-700 ink"
              style={{letterSpacing:'0.05em'}}
            />
            <div className="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
              <span className="smallcaps" style={{color:'var(--ink-soft)'}}>{espece.nom}</span>
              <span style={{color:'var(--gold-deep)'}}>•</span>
              <span className="smallcaps" style={{color:'var(--ink-soft)'}}>{classe.nom}{state.sousClasse ? ` · ${state.sousClasse}` : ''}</span>
              <span style={{color:'var(--gold-deep)'}}>•</span>
              <span className="smallcaps" style={{color:'var(--ink-soft)'}}>{state.alignement}</span>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-3 shrink-0">
          <div className="stat-box rounded-lg p-2 text-center min-w-[80px]">
            <div className="smallcaps" style={{color:'var(--ink-soft)', fontSize:'10px'}}>Niveau</div>
            <div className="cinzel text-4xl font-black ink leading-none mt-0.5">{state.niveau}</div>
          </div>
          <div className="stat-box rounded-lg p-2 text-center min-w-[80px]">
            <div className="smallcaps" style={{color:'var(--ink-soft)', fontSize:'10px'}}>Maîtrise</div>
            <div className="cinzel text-3xl font-black ink leading-none mt-1">+{prof}</div>
          </div>
          <button
            onClick={()=>update({inspiration: !state.inspiration})}
            className={`wax-seal shimmer ${state.inspiration ? 'glowing' : ''}`}
            style={!state.inspiration ? {background:'radial-gradient(circle at 35% 30%, #2a2a30 0%, #14141a 70%, #08060a 100%)', borderColor:'var(--gold-deep)', color:'var(--gold-deep)'} : {}}
            title="Inspiration héroïque (clic pour activer/désactiver)"
          >
            {state.inspiration ? '★' : '☆'}
          </button>
        </div>
      </div>
    </div>
  );
}

function Tabs({ tab, setTab, hasSpells }) {
  const items = [
    { id:'fiche', label:'Fiche', icon:<TabIcon name="scroll" /> },
    { id:'tracker', label:'Tracker', icon:<TabIcon name="heart" /> },
    ...(hasSpells ? [{ id:'sorts', label:'Sorts', icon:<TabIcon name="spark" /> }] : []),
    { id:'capacites', label:'Capacités', icon:<TabIcon name="bolt" /> },
    { id:'inventaire', label:'Inventaire', icon:<TabIcon name="bag" /> },
    { id:'niveau', label:'Niveau', icon:<TabIcon name="medal" /> },
    { id:'notes', label:'Notes', icon:<TabIcon name="quill" /> },
    { id:'reglages', label:'Réglages', icon:<TabIcon name="gear" /> },
  ];
  return (
    <div className="tabbar">
      {items.map(it => (
        <button
          key={it.id}
          onClick={()=>setTab(it.id)}
          className={`tab-btn flex items-center gap-1.5 ${tab===it.id ? 'active' : ''}`}
        >
          <span className="opacity-90">{it.icon}</span>
          <span className="hidden sm:inline">{it.label}</span>
        </button>
      ))}
    </div>
  );
}

function TabIcon({ name }) {
  const stroke = "currentColor";
  const sz = 16;
  const common = { width: sz, height: sz, viewBox: "0 0 24 24", fill: "none", stroke, strokeWidth: "1.6", strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case 'scroll':
      return <svg {...common}><path d="M5 4h11a3 3 0 0 1 3 3v10a3 3 0 0 0 3 3H8a3 3 0 0 1-3-3V4z"/><path d="M5 4a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3"/><path d="M9 8h7M9 12h7"/></svg>;
    case 'heart':
      return <svg {...common}><path d="M12 21s-7-4.5-9.5-9.2C.7 8.4 2.5 4 6.5 4 9 4 10.7 5.5 12 7c1.3-1.5 3-3 5.5-3 4 0 5.8 4.4 4 7.8C19 16.5 12 21 12 21z"/></svg>;
    case 'spark':
      return <svg {...common}><path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l4 4M15 15l4 4M5 19l4-4M15 9l4-4"/></svg>;
    case 'bolt':
      return <svg {...common}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/></svg>;
    case 'bag':
      return <svg {...common}><path d="M5 8h14l-1.2 12a2 2 0 0 1-2 2H8.2a2 2 0 0 1-2-2L5 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>;
    case 'swords':
      return <svg {...common}><path d="M14 5l5-3 1 1-3 5-3-3z"/><path d="M5 5L3 4 4 3l3 1M14 5l-9 9-2 5 5-2 9-9"/><path d="M5 14l5 5"/></svg>;
    case 'medal':
      return <svg {...common}><circle cx="12" cy="14" r="6"/><path d="M9 9 7 3h10l-2 6"/><path d="M12 11v3M10 14h4"/></svg>;
    case 'quill':
      return <svg {...common}><path d="M21 3L8 16l-2 5 5-2L21 6V3z"/><path d="M14 10l-3 3"/></svg>;
    case 'gear':
      return <svg {...common}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>;
    default: return null;

// ============================================================

function Fiche({ state, update, classe, espece, histo, prof }) {
  const setCarac = (id, val) => {
    update(s => ({ caracs: { ...s.caracs, [id]: Math.max(1, Math.min(30, Number(val)||10)) } }));
  };
  const toggleComp = (id) => {
    update(s => {
      const has = s.competences_maitrisees.includes(id);
      return { competences_maitrisees: has
        ? s.competences_maitrisees.filter(x=>x!==id)
        : [...s.competences_maitrisees, id] };
    });
  };
  const toggleExp = (id) => {
    update(s => {
      const has = s.competences_expertise.includes(id);
      const nouv = has ? s.competences_expertise.filter(x=>x!==id) : [...s.competences_expertise, id];
      // Forcer maîtrise si expertise
      const m = has ? s.competences_maitrisees : (s.competences_maitrisees.includes(id) ? s.competences_maitrisees : [...s.competences_maitrisees, id]);
      return { competences_expertise: nouv, competences_maitrisees: m };
    });
  };

  return (
    <div className="grid lg:grid-cols-3 gap-4">
      {/* Colonne gauche — caracs + sauvegardes */}
      <div className="space-y-3">
        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Caractéristiques</h3>
          <div className="grid grid-cols-2 gap-3">
            {CARACS.map(c => (
              <div key={c.id} className="carac-shield">
                <div className="label">{c.nom}</div>
                <div className="modifier">{fmt(mod(state.caracs[c.id]))}</div>
                <input
                  type="number"
                  value={state.caracs[c.id]}
                  onChange={e=>setCarac(c.id, e.target.value)}
                  className="score-input"
                  title="Score brut"
                />
              </div>
            ))}
          </div>
        </div>

        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Jets de Sauvegarde</h3>
          <div className="space-y-1">
            {CARACS.map(c => {
              const maitrise = (classe.sauvegardes||[]).includes(c.id) || (state.sauvegardes_extra||[]).includes(c.id);
              const overrideC = (state.bonus_caracs||{})[c.id] || 0;
              const bonus = mod(state.caracs[c.id]) + (maitrise ? prof : 0) + overrideC;
              return (
                <label key={c.id} className="flex items-center gap-3 py-1 row-hover rounded-md px-2 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={maitrise}
                    onChange={() => {
                      if ((classe.sauvegardes||[]).includes(c.id)) return;
                      update(s => {
                        const has = (s.sauvegardes_extra||[]).includes(c.id);
                        return { sauvegardes_extra: has
                          ? (s.sauvegardes_extra||[]).filter(x=>x!==c.id)
                          : [...(s.sauvegardes_extra||[]), c.id] };
                      });
                    }}
                    disabled={(classe.sauvegardes||[]).includes(c.id)}
                  />
                  <span className={`bonus-pill ${maitrise?'maitrise':''}`}>{fmt(bonus)}</span>
                  <span className="ink flex-1 cinzel" style={{fontSize:'14px', fontWeight:600}}>{c.nom}</span>
                </label>
              );
            })}
          </div>
        </div>
      </div>

      {/* Colonne centrale — compétences */}
      <div className="parchment rounded-xl p-4 max-h-[820px] overflow-y-auto scroll-thin">
        <h3 className="section-title">Compétences</h3>
        <div className="text-xs ink mb-2 italic text-center" style={{color:'var(--ink-faint)'}}>
          Cocher = maîtrise · Double-clic = expertise
        </div>
        <div className="space-y-0.5">
          {COMPETENCES.map(c => {
            const maitrise = state.competences_maitrisees.includes(c.id);
            const expertise = state.competences_expertise.includes(c.id);
            const overrideC = (state.bonus_caracs||{})[c.carac] || 0;
            const bonus = mod(state.caracs[c.carac]) + (maitrise ? prof : 0) + (expertise ? prof : 0) + overrideC;
            return (
              <div key={c.id} className="flex items-center gap-3 py-1 row-hover rounded-md px-2">
                <input
                  type="checkbox"
                  checked={maitrise}
                  onChange={()=>toggleComp(c.id)}
                  onDoubleClick={()=>toggleExp(c.id)}
                />
                <span className={`bonus-pill ${expertise?'expert':maitrise?'maitrise':''}`}>{fmt(bonus)}</span>
                <span className="ink flex-1 cinzel" style={{fontSize:'13px', fontWeight:600}}>
                  {c.nom}
                  <span className="ml-1.5 smallcaps" style={{color:'var(--ink-faint)', fontSize:'9px', fontWeight:600}}>
                    {c.carac}
                  </span>
                </span>
                {expertise && <span className="gold" style={{fontSize:'14px'}} title="Expertise">★</span>}
              </div>
            );
          })}
        </div>
        <div className="divider"></div>
        <div className="vellum">
          <div className="smallcaps cinzel" style={{color:'var(--ink-soft)', fontSize:'10px', textAlign:'center', marginBottom:'6px'}}>Perceptions passives</div>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div>
              <div className="bonus-pill maitrise mx-auto" style={{minWidth:'40px'}}>{10 + mod(state.caracs.sag) + (state.competences_maitrisees.includes('perception')?prof:0) + (state.competences_expertise.includes('perception')?prof:0) + ((state.bonus_caracs||{}).sag||0)}</div>
              <div className="smallcaps mt-1" style={{color:'var(--ink-soft)', fontSize:'9px'}}>Perception</div>
            </div>
            <div>
              <div className="bonus-pill mx-auto" style={{minWidth:'40px'}}>{10 + mod(state.caracs.int) + (state.competences_maitrisees.includes('investigation')?prof:0) + (state.competences_expertise.includes('investigation')?prof:0) + ((state.bonus_caracs||{}).int||0)}</div>
              <div className="smallcaps mt-1" style={{color:'var(--ink-soft)', fontSize:'9px'}}>Investigation</div>
            </div>
            <div>
              <div className="bonus-pill maitrise mx-auto" style={{minWidth:'40px'}}>{10 + mod(state.caracs.sag) + (state.competences_maitrisees.includes('perspicacite')?prof:0) + (state.competences_expertise.includes('perspicacite')?prof:0) + ((state.bonus_caracs||{}).sag||0)}</div>
              <div className="smallcaps mt-1" style={{color:'var(--ink-soft)', fontSize:'9px'}}>Perspicacité</div>
            </div>
          </div>
        </div>
      </div>

      {/* Colonne droite — combat stats */}
      <div className="space-y-3">
        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Statistiques de combat</h3>
          {/* CA avec breakdown auto */}
          <CABlock state={state} update={update} />
          <div className="grid grid-cols-2 gap-2 mt-2">
            <FieldNum label="Init." value={mod(state.caracs.dex)+(Number(state.initiative_bonus)||0)} readonly />
            <FieldNum label="Vitesse" value={state.vitesse} onChange={v=>update({vitesse:v})} suffix="m" />
          </div>
          <div className="grid grid-cols-3 gap-2 mt-2">
            <FieldNum label="PV max" value={state.pv_max} onChange={v=>update({pv_max:v, pv_actuels: Math.min(state.pv_actuels, v)})} />
            <FieldNum label="PV act." value={state.pv_actuels} onChange={v=>update({pv_actuels:v})} />
            <FieldNum label="PV temp" value={state.pv_temp} onChange={v=>update({pv_temp:v})} />
          </div>
          <div className="grid grid-cols-2 gap-2 mt-2">
            <FieldNum label="Dés vie tot" value={state.des_vie_total} onChange={v=>update({des_vie_total:v})} suffix={`d${classe.dv}`} />
            <FieldNum label="Dés util." value={state.des_vie_utilises} onChange={v=>update({des_vie_utilises:v})} />
          </div>
          <div className="mt-2 text-xs ink">
            <strong>Bonus init :</strong> <input type="number" value={state.initiative_bonus} onChange={e=>update({initiative_bonus:Number(e.target.value)||0})} className="input-dnd w-12" /> (Vigilant +5, etc.)
          </div>
        </div>

        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Identité</h3>
          <Field label="Espèce" value={state.espece} onChange={v=>update({espece:v})} type="select" options={Object.entries(ESPECES).map(([k,v])=>[k,v.nom])} />
          <Field label="Classe" value={state.classe} onChange={v=>update({classe:v})} type="select" options={Object.entries(CLASSES).map(([k,v])=>[k,v.nom])} />
          <Field label="Sous-classe" value={state.sousClasse} onChange={v=>update({sousClasse:v})} />
          <Field label="Historique" value={state.historique} onChange={v=>update({historique:v})} type="select" options={Object.entries(HISTORIQUES).map(([k,v])=>[k,v.nom])} />
          <Field label="Alignement" value={state.alignement} onChange={v=>update({alignement:v})} />
          <Field label="Pronoms" value={state.pronoms} onChange={v=>update({pronoms:v})} />
          <div className="grid grid-cols-3 gap-2">
            <Field label="Âge" value={state.age} onChange={v=>update({age:v})} />
            <Field label="Taille" value={state.taille} onChange={v=>update({taille:v})} />
            <Field label="Poids" value={state.poids} onChange={v=>update({poids:v})} />
          </div>
          <div className="grid grid-cols-3 gap-2">
            <Field label="Yeux" value={state.yeux} onChange={v=>update({yeux:v})} />
            <Field label="Peau" value={state.peau} onChange={v=>update({peau:v})} />
            <Field label="Cheveux" value={state.cheveux} onChange={v=>update({cheveux:v})} />
          </div>
          <FieldArea label="Apparence" value={state.apparence} onChange={v=>update({apparence:v})} />
        </div>

        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Personnalité</h3>
          <FieldArea label="Traits" value={state.traits} onChange={v=>update({traits:v})} />
          <FieldArea label="Idéaux" value={state.ideaux} onChange={v=>update({ideaux:v})} />
          <FieldArea label="Liens" value={state.liens} onChange={v=>update({liens:v})} />
          <FieldArea label="Défauts" value={state.defauts} onChange={v=>update({defauts:v})} />
        </div>

        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Histoire du personnage</h3>
          <FieldArea label="Récit" value={state.histoire_perso} onChange={v=>update({histoire_perso:v})} />
        </div>

        <div className="parchment rounded-xl p-4">
          <h3 className="section-title">Bonus de caractéristique custom</h3>
          <div className="text-xs ink mb-2 italic" style={{color:'var(--ink-faint)'}}>
            Bonus appliqué à TOUS les jets utilisant cette carac (saves + skills + passives). Utile pour ceintures de force, items magiques, overrides AideDD, etc.
          </div>
          <div className="grid grid-cols-6 gap-1">
            {CARACS.map(c => (
              <div key={c.id} className="text-center">
                <div className="smallcaps" style={{fontSize:'9px', color:'var(--ink-soft)'}}>{c.id.toUpperCase()}</div>
                <input
                  type="number"
                  value={(state.bonus_caracs||{})[c.id] || 0}
                  onChange={e => update(s => ({ bonus_caracs: { ...(s.bonus_caracs||{}), [c.id]: Number(e.target.value)||0 } }))}
                  className="input-dnd w-full text-center font-bold"
                />
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type, options }) {
  if (type === 'select') {
    return (
      <div className="mb-2">
        <label className="block text-xs uppercase ink font-semibold mb-0.5">{label}</label>
        <select value={value} onChange={e=>onChange(e.target.value)} className="input-dnd w-full">
          {options.map(([k,v]) => <option key={k} value={k}>{v}</option>)}
        </select>
      </div>
    );
  }
  return (
    <div className="mb-2">
      <label className="block text-xs uppercase ink font-semibold mb-0.5">{label}</label>
      <input value={value||''} onChange={e=>onChange(e.target.value)} className="input-dnd w-full" />
    </div>
  );
}

// === CA BLOCK : calcul auto depuis l'équipement (armure + bouclier + DEX + magique) ===
function computeCA(state) {
  const armure = ARMURES[state.armure_id || 'aucune'] || ARMURES.aucune;
  const dexMod = mod(state.caracs.dex);
  const dexAppliquee = armure.dex_max == null ? dexMod : Math.min(dexMod, armure.dex_max);
  const bouclier = state.bouclier_equipe ? 2 : 0;
  const magique = Number(state.ca_bonus_magique) || 0;
  return {
    armure,
    base: armure.ca_base,
    dex: dexAppliquee,
    dex_brut: dexMod,
    dex_max: armure.dex_max,
    bouclier,
    magique,
    total: armure.ca_base + dexAppliquee + bouclier + magique,
  };
}

function CABlock({ state, update }) {
  const calc = computeCA(state);
  const caEffective = state.auto_ca ? calc.total : (state.ca || 10);
  return (
    <div>
      <div className="grid grid-cols-2 gap-2">
        <div className="carac-shield" style={{padding:'10px 8px'}}>
          <div className="label">Classe d'armure</div>

          <label className="flex items-center gap-1 justify-center mt-1" style={{fontSize:'10px'}}>
            <input type="checkbox" checked={!!state.auto_ca} onChange={e=>update({auto_ca: e.target.checked})} style={{width:14, height:14}}/>
            <span style={{color:'var(--ink-soft)'}} className="smallcaps">Calcul auto</span>
          </label>
        </div>
        <div className="vellum p-2" style={{fontSize:'11px', lineHeight:1.5}}>
          {state.auto_ca ? (
            <>
              <div className="smallcaps cinzel" style={{color:'var(--ink-soft)', fontSize:'9px', marginBottom:4}}>Décomposition</div>
              <div className="ink">{calc.armure.nom} <strong>{calc.base}</strong></div>
              <div className="ink">+ DEX {fmt(calc.dex)}{calc.dex_max != null && calc.dex_brut > calc.dex_max ? <span style={{color:'var(--ink-faint)'}}> (plafond +{calc.dex_max})</span> : null}</div>
              {calc.bouclier > 0 && <div className="ink">+ Bouclier <strong>+2</strong></div>}
              {calc.magique !== 0 && <div className="ink">+ Magique {fmt(calc.magique)}</div>}
              <div className="divider" style={{margin:'4px 0'}}></div>

          ) : (
            <>
              <div className="smallcaps cinzel" style={{color:'var(--ink-soft)', fontSize:'9px', marginBottom:4}}>CA manuelle</div>

            <div className="smallcaps" style={{color:'var(--ink-soft)', fontSize:'9px'}}>Armure équipée</div>
            <select value={state.armure_id || 'aucune'} onChange={e=>update({armure_id: e.target.value})} className="input-dnd w-full">
              {Object.entries(ARMURES).map(([k, v]) => (
                <option key={k} value={k}>{v.nom} ({v.type}, CA {v.ca_base}{v.dex_max!=null?`+DEX≤${v.dex_max}`:'+DEX'})</option>
              ))}
            </select>
            {calc.armure.str_min > 0 && state.caracs.for < calc.armure.str_min && (
              <div className="blood text-xs mt-1">⚠ FOR ≥ {calc.armure.str_min} requise (vous avez {state.caracs.for}) — vitesse −3m</div>
            )}
            {calc.armure.furtivite_dis && (
              <div className="text-xs mt-1" style={{color:'var(--ink-faint)'}}>⚠ Désavantage en Discrétion</div>
            )}
          </div>
          <div className="flex flex-col gap-1">
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={!!state.bouclier_equipe} onChange={e=>update({bouclier_equipe: e.target.checked})} />

// ============================================================
// TRACKER — temps réel : PV, dés vie, slots, états
// ============================================================
function Tracker({ state, update, classe, prof }) {
  const [degats, setDegats] = useState(0);
  const [soin, setSoin] = useState(0);
  const [tempInput, setTempInput] = useState(0);

  const slotsMax = useMemo(() => {
    if (classe.progression === 'complete') return SLOTS_FULL[state.niveau] || [0,0,0,0,0,0,0,0,0];
    if (classe.progression === 'demi') {
      const s = SLOTS_HALF[state.niveau] || [0,0,0,0,0];
      return [...s, 0,0,0,0].slice(0,9);
    }
    if (classe.progression === 'pacte') {
      const p = PACT_SLOTS[state.niveau] || {slots:0, niv:0};
      const arr = [0,0,0,0,0,0,0,0,0];
      if (p.niv > 0) arr[p.niv-1] = p.slots;
      return arr;
    }
    return [0,0,0,0,0,0,0,0,0];
  }, [classe.progression, state.niveau]);

  const appliquerDegats = () => {
    const d = Number(degats)||0;
    if (d <= 0) return;
    let temp = state.pv_temp || 0;
    let pv = state.pv_actuels;
    let restant = d;
    if (temp > 0) {
      const abs = Math.min(temp, restant);
      temp -= abs; restant -= abs;
    }
    pv -= restant;
    update({ pv_actuels: pv, pv_temp: temp });
    setDegats(0);
  };
  const appliquerSoin = () => {
    const s = Number(soin)||0;
    if (s <= 0) return;
    update({ pv_actuels: Math.min(state.pv_max, state.pv_actuels + s) });
    setSoin(0);
  };
  const setTemp = () => {
    const t = Number(tempInput)||0;
    update({ pv_temp: Math.max(state.pv_temp||0, t) });
    setTempInput(0);
  };

  const reposCourt = () => {
    if (!confirm('Effectuer un repos court ? (récupère charges "court" et permet de dépenser des dés de vie)')) return;
    update(s => ({
      capacites: (s.capacites||[]).map(c => c.recovery === 'court' ? {...c, charges_used: 0} : c),
      pact_slots_used: 0, // pacte récupère au repos court
    }));
  };
  const reposLong = () => {
    if (!confirm('Effectuer un repos long ? Récupère tous les PV, slots, charges (long), et la moitié des dés de vie utilisés.')) return;
    update(s => ({
      pv_actuels: s.pv_max,
      pv_temp: 0,
      slots_used: [0,0,0,0,0,0,0,0,0],
      pact_slots_used: 0,
      des_vie_utilises: Math.max(0, s.des_vie_utilises - Math.max(1, Math.floor(s.des_vie_total/2))),
      death_saves: { success: 0, failure: 0 },
      capacites: (s.capacites||[]).map(c => (c.recovery === 'court' || c.recovery === 'long') ? {...c, charges_used: 0} : c),
    }));
  };

  const utiliserSlot = (niv, delta) => {
    update(s => {
      const used = [...s.slots_used];
      used[niv-1] = Math.max(0, Math.min(slotsMax[niv-1], used[niv-1] + delta));
      return { slots_used: used };
    });
  };

  const depenserDeVie = () => {
    if (state.des_vie_utilises >= state.des_vie_total) { alert('Plus de dés de vie disponibles.'); return; }
    const r = roll(`1d${classe.dv}`);
    const total = r.total + mod(state.caracs.con);
    update(s => ({
      des_vie_utilises: s.des_vie_utilises + 1,
      pv_actuels: Math.min(s.pv_max, s.pv_actuels + total),
    }));
    alert(`Dé de vie : ${r.detail} + CON(${fmt(mod(state.caracs.con))}) = ${total} PV récupérés`);
  };

  const toggleEtat = (etat) => {
    update(s => {
      const has = (s.etats||[]).find(e => e.id === etat.id);
      return { etats: has
        ? (s.etats||[]).filter(e => e.id !== etat.id)
        : [...(s.etats||[]), { id: etat.id, niveau: 1 }] };
    });
  };

  const setEpuisement = (n) => {
    update(s => {
      const others = (s.etats||[]).filter(e => e.id !== 'epuisement');
      return { etats: n > 0 ? [...others, { id: 'epuisement', niveau: n }] : others };
    });
  };

  const epuisement = (state.etats||[]).find(e => e.id === 'epuisement');
  const pvPct = Math.max(0, Math.min(100, (state.pv_actuels/state.pv_max)*100));
  const pvColor = pvPct > 50 ? 'bg-green-600' : pvPct > 25 ? 'bg-yellow-600' : 'bg-red-700';

  const pactInfo = classe.progression === 'pacte' ? PACT_SLOTS[state.niveau] : null;

  return (
    <div className="grid lg:grid-cols-2 gap-4">
      {/* Bloc PV */}
      <div className="parchment rounded-xl p-4">
        <h3 className="section-title">Points de vie</h3>
        <div className="text-center my-3">
          <div className="text-5xl font-bold ink">{state.pv_actuels} <span className="text-2xl">/ {state.pv_max}</span></div>
          {state.pv_temp > 0 && <div className="text-blue-700 font-semibold">+{state.pv_temp} PV temporaires</div>}
        </div>
        <div className="w-full bg-amber-900/20 rounded-full h-4 overflow-hidden mb-3">
          <div className={`${pvColor} h-full transition-all`} style={{width: `${pvPct}%`}}></div>
        </div>
        <div className="grid grid-cols-3 gap-2">
          <div>
            <label className="text-xs ink font-semibold">Dégâts subis</label>
            <div className="flex gap-1">
              <input type="number" value={degats} onChange={e=>setDegats(e.target.value)} className="input-dnd w-full" />
              <button className="dnd-btn dnd-btn-danger rounded px-2 text-sm" onClick={appliquerDegats}>−</button>
            </div>
          </div>
          <div>
            <label className="text-xs ink font-semibold">Soins reçus</label>
            <div className="flex gap-1">
              <input type="number" value={soin} onChange={e=>setSoin(e.target.value)} className="input-dnd w-full" />
              <button className="dnd-btn rounded px-2 text-sm" onClick={appliquerSoin}>+</button>
            </div>
          </div>
          <div>
            <label className="text-xs ink font-semibold">PV Temp</label>
            <div className="flex gap-1">
              <input type="number" value={tempInput} onChange={e=>setTempInput(e.target.value)} className="input-dnd w-full" />
              <button className="dnd-btn rounded px-2 text-sm" onClick={setTemp}>=</button>
            </div>
          </div>
        </div>

        {/* Death Saves */}
        {state.pv_actuels <= 0 && (
          <div className="mt-3 p-2 bg-red-900/20 rounded">
            <div className="text-sm font-bold blood mb-1">Jets contre la mort</div>
            <div className="flex justify-between items-center">
              <div>
                <span className="text-xs ink">Succès :</span>
                {[0,1,2].map(i => (
                  <button key={i} className={`death-pip success ${i<state.death_saves.success?'':'opacity-30'}`}
                    onClick={()=>update(s=>({death_saves:{...s.death_saves, success: i<s.death_saves.success ? i : i+1}}))}
                    style={{display:'inline-block', marginLeft:4}} />
                ))}
              </div>
              <div>
                <span className="text-xs ink">Échecs :</span>
                {[0,1,2].map(i => (
                  <button key={i} className={`death-pip failure ${i<state.death_saves.failure?'':'opacity-30'}`}
                    onClick={()=>update(s=>({death_saves:{...s.death_saves, failure: i<s.death_saves.failure ? i : i+1}}))}
                    style={{display:'inline-block', marginLeft:4}} />
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Dés de vie */}
        <div className="mt-3 stat-box rounded p-2">
          <div className="text-xs ink font-semibold mb-1">Dés de vie ({state.des_vie_total - state.des_vie_utilises}/{state.des_vie_total} d{classe.dv})</div>
          <div className="flex gap-2 items-center">
            <button className="dnd-btn rounded px-3 py-1 text-sm" onClick={depenserDeVie}>Dépenser un dé</button>
            <button className="dnd-btn rounded px-2 py-1 text-xs" onClick={()=>update(s=>({des_vie_utilises: Math.max(0, s.des_vie_utilises-1)}))}>+1 dé</button>
            <button className="dnd-btn rounded px-2 py-1 text-xs" onClick={()=>update(s=>({des_vie_utilises: Math.min(s.des_vie_total, s.des_vie_utilises+1)}))}>−1 dé</button>
          </div>
        </div>

        {/* Repos */}
        <div className="mt-3 flex gap-2">
          <button className="dnd-btn rounded-lg px-3 py-2 flex-1" onClick={reposCourt}>☕ Repos court (1h)</button>
          <button className="dnd-btn rounded-lg px-3 py-2 flex-1" onClick={reposLong}>🌙 Repos long (8h)</button>
        </div>
      </div>

      {/* Slots de sorts */}
      <div className="parchment rounded-xl p-4">
        <h3 className="section-title">Emplacements de sorts</h3>
        {pactInfo ? (
          <div className="stat-box rounded p-3 mb-2">
            <div className="text-sm ink font-semibold">Pacte (Occultiste) — Niveau {pactInfo.niv} · {pactInfo.slots} slots</div>
            <div className="flex gap-2 mt-2">
              {Array.from({length: pactInfo.slots}).map((_,i) => (
                <button key={i}
                  className={`slot-pip ${i < state.pact_slots_used ? 'used' : ''}`}
                  onClick={()=>update(s=>({pact_slots_used: i < s.pact_slots_used ? i : i+1}))}
                />
              ))}
              <button className="dnd-btn rounded px-2 py-0.5 text-xs ml-auto" onClick={()=>update({pact_slots_used:0})}>Restaurer</button>
            </div>
            <div className="text-xs ink mt-1 italic">Récupération : repos court</div>
          </div>
        ) : null}
        {slotsMax.map((max, idx) => {
          if (max === 0) return null;
          const niv = idx + 1;
          const used = state.slots_used[idx];
          return (
            <div key={niv} className="stat-box rounded p-2 mb-1.5">
              <div className="flex items-center justify-between">
                <div className="font-semibold ink">Niveau {niv}</div>
                <div className="flex gap-1 items-center">
                  {Array.from({length: max}).map((_,i) => (
                    <button key={i}
                      className={`slot-pip ${i < used ? 'used' : ''}`}
                      onClick={()=>{
                        update(s => {
                          const arr = [...s.slots_used];
                          arr[idx] = i < arr[idx] ? i : i+1;
                          return { slots_used: arr };
                        });
                      }}
                    />
                  ))}
                  <span className="text-xs ink ml-2">{max-used}/{max}</span>
                </div>
              </div>
            </div>
          );
        })}
        {slotsMax.every(s=>s===0) && !pactInfo && <div className="ink italic">Cette classe n'utilise pas d'emplacements de sorts.</div>}
      </div>

      {/* États */}
      <div className="parchment rounded-xl p-4 lg:col-span-2">
        <h3 className="section-title">États</h3>
        <div className="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
          {ETATS.filter(e=>e.id!=='epuisement').map(e => {
            const actif = (state.etats||[]).find(x => x.id === e.id);
            return (
              <div key={e.id}
                className={`stat-box rounded p-2 cursor-pointer transition-all ${actif?'ring-2 ring-red-700 bg-red-900/20':''}`}
                onClick={()=>toggleEtat(e)}
                title={e.desc}
              >
                <div className="font-semibold ink text-sm">{e.nom}</div>
                <div className="text-xs ink/80 truncate">{e.desc.slice(0,60)}…</div>
              </div>
            );
          })}
        </div>
        {/* Épuisement */}
        <div className="stat-box rounded p-2 mt-2">
          <div className="font-semibold ink text-sm">Épuisement (0–6) — actuel : {epuisement?.niveau || 0}</div>
          <div className="flex gap-1 mt-1">
            {[0,1,2,3,4,5,6].map(n => (
              <button key={n}
                onClick={()=>setEpuisement(n)}
                className={`px-3 py-1 rounded ${(epuisement?.niveau||0) === n ? 'dnd-btn dnd-btn-danger' : 'dnd-btn'}`}
              >{n}</button>
            ))}
          </div>
          {epuisement && epuisement.niveau > 0 && (
            <div className="text-xs ink italic mt-1">
              Pénalité de −{epuisement.niveau*2} aux jets de d20 et CD. {epuisement.niveau >= 6 ? '⚠️ MORT.' : ''}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SORTS — gestion préparés & casting
// ============================================================
function Sorts({ state, update, classe, prof, sortsDB, caracSort }) {
  const [filtre, setFiltre] = useState({ niveau: 'tous', ecole: 'tous', q: '', classe: 'mes' });
  const [showAdd, setShowAdd] = useState(false);

  const caracMod = caracSort ? mod(state.caracs[caracSort]) : 0;
  const ddSorts = state.dd_sorts || (8 + prof + caracMod);
  const bonusAtt = state.bonus_attaque_sort || (prof + caracMod);
  const aPreparer = state.sorts_a_preparer || (state.niveau + caracMod);

  const codeClasse = useMemo(() => {
    const m = { barde:'B', clerc:'C', druide:'D', ensorceleur:'E', magicien:'M', paladin:'P', rodeur:'R', occultiste:'O' };
    return m[state.classe] || '';
  }, [state.classe]);

  const sortsConnusIds = (state.sorts_connus||[]).map(s => s.id);
  const sortsConnusObjs = sortsConnusIds.map(id => sortsDB.find(s => s.id === id)).filter(Boolean);

  const slotsMax = useMemo(() => {
    if (classe.progression === 'complete') return SLOTS_FULL[state.niveau] || [];
    if (classe.progression === 'demi') return [...(SLOTS_HALF[state.niveau]||[]), 0,0,0,0].slice(0,9);
    if (classe.progression === 'pacte') {
      const p = PACT_SLOTS[state.niveau] || {slots:0, niv:0};
      const arr = [0,0,0,0,0,0,0,0,0];
      if (p.niv > 0) arr[p.niv-1] = p.slots;
      return arr;
    }
    return [];
  }, [classe.progression, state.niveau]);

  const sortsFiltres = useMemo(() => {
    let s = filtre.classe === 'mes' ? sortsConnusObjs : sortsDB;
    if (filtre.niveau !== 'tous') s = s.filter(x => x.niveau === Number(filtre.niveau));
    if (filtre.ecole !== 'tous') s = s.filter(x => x.ecole === filtre.ecole);
    if (filtre.classe !== 'mes' && filtre.classe !== 'tous') s = s.filter(x => (x.classes||[]).includes(filtre.classe));
    if (filtre.q) {
      const q = filtre.q.toLowerCase();
      s = s.filter(x => x.nom.toLowerCase().includes(q) || (x.desc||'').toLowerCase().includes(q));
    }
    return s.sort((a,b) => a.niveau - b.niveau || a.nom.localeCompare(b.nom));
  }, [filtre, sortsConnusObjs, sortsDB]);

  const ajouter = (sort) => {
    if (sortsConnusIds.includes(sort.id)) return;
    update(s => ({
      sorts_connus: [...(s.sorts_connus||[]), { id: sort.id, prepare: false, cantrip: sort.niveau === 0 }]
    }));
  };
  const retirer = (id) => {
    update(s => ({ sorts_connus: (s.sorts_connus||[]).filter(x => x.id !== id) }));
  };
  const togglePrepare = (id) => {
    update(s => ({
      sorts_connus: (s.sorts_connus||[]).map(x => x.id === id ? {...x, prepare: !x.prepare} : x)
    }));
  };

  const lancerSort = (sort) => {
    if (sort.niveau === 0) {
      alert(`✨ ${sort.nom} (cantrip) lancé.`);
      return;
    }
    // Demande à quel niveau lancer (si emplacement supérieur dispo)
    const minNiv = sort.niveau;
    const dispo = [];
    for (let n = minNiv; n <= 9; n++) {
      const restant = (slotsMax[n-1]||0) - (state.slots_used[n-1]||0);
      if (restant > 0) dispo.push({niv:n, restant});
    }
    if (dispo.length === 0) {
      // pacte ?
      if (classe.progression === 'pacte') {
        const p = PACT_SLOTS[state.niveau];
        if (p && p.niv >= minNiv && state.pact_slots_used < p.slots) {
          if (confirm(`Lancer ${sort.nom} avec un emplacement de pacte (niveau ${p.niv}) ?`)) {
            update(s => ({ pact_slots_used: s.pact_slots_used + 1 }));
            alert(`✨ ${sort.nom} lancé (slot pacte niv ${p.niv}).`);
          }
          return;
        }
      }
      alert('Aucun emplacement disponible pour lancer ce sort.');
      return;
    }
    let niv = minNiv;
    if (dispo.length > 1) {

function SortCard({ sort, dansLeur, meta, onAjouter, onRetirer, onTogglePrepare, onLancer }) {

  const niv = sort.niveau === 0 ? 'Cantrip' : `Niv ${sort.niveau}`;

            <button onClick={onLancer} className="dnd-btn rounded px-2 py-1 text-xs" title="Lancer le sort (consomme un slot)">🎯</button>
          )}
          {dansLeur ? (
            <button onClick={onRetirer} className="dnd-btn dnd-btn-danger rounded px-2 py-1 text-xs">−</button>

}

// Dice roller — supporte 2d6+3, 1d20-1, etc. (et critiques)
// (utilisé par : level-up, dépense de dé de vie, attaques d'armes dans l'inventaire)
function roll(formule, crit=false) {
  const m = String(formule).replace(/\s/g,'').match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if (!m) {
    const n = Number(formule);
    if (!isNaN(n)) return { total:n, detail:String(n) };
    return { total:0, detail:'?' };
  }
  let n = Number(m[1]);
  const sides = Number(m[2]);
  const bonus = m[3] ? Number(m[3]) : 0;
  if (crit) n *= 2;
  const dice = [];
  for (let i = 0; i < n; i++) dice.push(1 + Math.floor(Math.random()*sides));
  const sum = dice.reduce((t,v)=>t+v, 0);
  const detail = `[${dice.join(',')}]${bonus?(bonus>=0?`+${bonus}`:bonus):''}`;
  return { total: sum + bonus, detail };
}

          <button onClick={()=>setStep('intro')} className="text-xs ink mt-3 underline">← Annuler</button>
        </div>
      )}

      {step === 'done' && (
        <div className="text-center py-6">
          <div className="text-3xl mb-2">🎉</div>
          <div className="text-xl font-bold ink">Niveau {state.niveau} atteint !</div>
          <div className="ink mt-2 text-sm">N'oublie pas de :</div>
          <ul className="text-sm ink text-left max-w-md mx-auto mt-1 space-y-1">
            <li>• Vérifier les nouvelles capacités de ta classe / sous-classe</li>
            <li>• Mettre à jour tes sorts si lanceur (onglet Sorts)</li>
            {[4,8,12,16,19].includes(state.niveau) && <li className="font-bold gold">• Choisir une Augmentation de carac (+2 ou +1/+1) ou un Talent !</li>}
            {[5,11,17].includes(state.niveau) && <li className="font-bold gold">• Bonus de maîtrise augmenté à +{PROF_BY_LEVEL[state.niveau]}</li>}
            <li>• Ajouter les nouvelles capacités dans l'onglet Capacités</li>
          </ul>
          <button onClick={()=>setStep('intro')} className="dnd-btn rounded-lg px-4 py-2 mt-4">Retour</button>
        </div>
      )}

      <details className="mt-4">
        <summary className="text-sm ink font-semibold cursor-pointer">Niveau manuel (descendre / forcer)</summary>
        <div className="flex gap-2 mt-2">
          <button onClick={()=>{ if (confirm(`Descendre au niveau ${state.niveau-1} ?`)) update({niveau: Math.max(1, state.niveau-1)}); }} className="dnd-btn dnd-btn-danger rounded px-3 py-1 text-sm">Niveau −1</button>
          <input type="number" value={state.niveau} onChange={e=>update({niveau: Math.max(1, Math.min(20, Number(e.target.value)||1))})} className="input-dnd w-20 text-center" />
        </div>
      </details>
    </div>
  );
}

// ============================================================
// CAPACITÉS — avec charges et descriptions
// ============================================================
function Capacites({ state, update, classe, espece, histo }) {
  const [edit, setEdit] = useState(null);
  const [nouvelle, setNouvelle] = useState({ nom:'', source:'', desc:'', charges_max:0, recovery:'long' });

  const utiliser = (id, delta) => {
    update(s => ({
      capacites: (s.capacites||[]).map(c => {
        if (c.id !== id) return c;
        const nouv = Math.max(0, Math.min(c.charges_max||0, (c.charges_used||0) + delta));
        return { ...c, charges_used: nouv };
      })
    }));
  };

  const supprimer = (id) => {
    if (confirm('Supprimer cette capacité ?')) update(s => ({ capacites: (s.capacites||[]).filter(c => c.id !== id) }));
  };

  const updateCap = (id, patch) => {
    update(s => ({ capacites: (s.capacites||[]).map(c => c.id === id ? {...c, ...patch} : c) }));
  };

  const ajouter = () => {
    if (!nouvelle.nom) return;
    update(s => ({ capacites: [...(s.capacites||[]), {...nouvelle, id:'c'+Date.now(), charges_used:0, charges_max: Number(nouvelle.charges_max)||0}] }));
    setNouvelle({ nom:'', source:'', desc:'', charges_max:0, recovery:'long' });
  };

  return (
    <div className="space-y-3">
      <div className="parchment rounded-xl p-4">
        <h3 className="section-title">Capacités & Traits</h3>
        <div className="space-y-2">
          {(state.capacites||[]).map(c => (
            <div key={c.id} className="stat-box rounded p-3">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="font-bold ink">{c.nom} <span className="text-xs gold ml-1">{c.source}</span></div>
                  <div className="text-sm ink mt-1 whitespace-pre-line">{c.desc}</div>
                </div>
                <div className="flex flex-col items-end gap-1">
                  {c.charges_max > 0 && (
                    <div className="flex flex-col items-end">
                      <div className="flex gap-0.5">
                        {Array.from({length: c.charges_max}).map((_,i) => (
                          <button key={i}
                            className={`slot-pip ${i < (c.charges_used||0) ? 'used' : ''}`}
                            onClick={()=>utiliser(c.id, i < (c.charges_used||0) ? -((c.charges_used||0)-i) : (i+1) - (c.charges_used||0))}
                          />
                        ))}
                      </div>
                      <div className="text-xs ink mt-0.5">{c.charges_max - (c.charges_used||0)}/{c.charges_max} · récup. {c.recovery==='court'?'court':c.recovery==='long'?'long':'manuel'}</div>
                    </div>
                  )}
                  <div className="flex gap-1">
                    <button onClick={()=>setEdit(c.id===edit?null:c.id)} className="dnd-btn rounded px-2 py-0.5 text-xs">✎</button>
                    <button onClick={()=>supprimer(c.id)} className="dnd-btn dnd-btn-danger rounded px-2 py-0.5 text-xs">×</button>
                  </div>
                </div>
              </div>
              {edit === c.id && (
                <div className="mt-2 grid grid-cols-2 gap-1 pt-2 border-t border-amber-700/30">
                  <input value={c.nom} onChange={e=>updateCap(c.id,{nom:e.target.value})} className="input-dnd col-span-2" placeholder="Nom" />
                  <input value={c.source} onChange={e=>updateCap(c.id,{source:e.target.value})} className="input-dnd" placeholder="Source" />
                  <select value={c.recovery||'long'} onChange={e=>updateCap(c.id,{recovery:e.target.value})} className="input-dnd">
                    <option value="long">Repos long</option>
                    <option value="court">Repos court</option>
                    <option value="manuel">Manuel</option>
                  </select>
                  <input type="number" value={c.charges_max||0} onChange={e=>updateCap(c.id,{charges_max:Number(e.target.value)||0})} className="input-dnd" placeholder="Charges max" />
                  <textarea value={c.desc||''} onChange={e=>updateCap(c.id,{desc:e.target.value})} className="input-dnd col-span-2" rows={3} placeholder="Description" />
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <div className="parchment rounded-xl p-4">
        <h4 className="font-bold ink mb-2">+ Ajouter une capacité</h4>
        <div className="grid grid-cols-2 gap-2">
          <input placeholder="Nom" value={nouvelle.nom} onChange={e=>setNouvelle({...nouvelle,nom:e.target.value})} className="input-dnd col-span-2" />
          <input placeholder="Source (Classe niv 3, Espèce…)" value={nouvelle.source} onChange={e=>setNouvelle({...nouvelle,source:e.target.value})} className="input-dnd col-span-2" />
          <input type="number" placeholder="Charges max (0 = illimité)" value={nouvelle.charges_max} onChange={e=>setNouvelle({...nouvelle,charges_max:e.target.value})} className="input-dnd" />
          <select value={nouvelle.recovery} onChange={e=>setNouvelle({...nouvelle,recovery:e.target.value})} className="input-dnd">
            <option value="long">Récup. repos long</option>
            <option value="court">Récup. repos court</option>
            <option value="manuel">Récup. manuelle</option>
          </select>
          <textarea placeholder="Description" value={nouvelle.desc} onChange={e=>setNouvelle({...nouvelle,desc:e.target.value})} className="input-dnd col-span-2" rows={3} />
          <button onClick={ajouter} className="dnd-btn rounded px-4 py-2 col-span-2">Ajouter</button>
        </div>
      </div>
    </div>
  );
}
function Notes({ state, update }) {

      <h3 className="text-lg font-bold ink mb-2">Notes de campagne</h3>
      <textarea value={state.notes||''} onChange={e=>update({notes:e.target.value})} className="input-dnd w-full" rows={20} />

function Reglages({ state, update, setState }) {
  const exp = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${(state.nom||'perso').replace(/\s/g,'_')}.json`;
    a.click();
  };
  const imp = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        setState({ ...defaultCharacter(), ...data });
      } catch(err) { alert('Fichier invalide'); }
    };
    r.readAsText(f);
  };
  return (
    <div className="parchment rounded-xl p-4">
      <h3 className="text-lg font-bold ink mb-2">Réglages</h3>
      <div className="flex flex-wrap gap-2">
        <button className="dnd-btn rounded-lg px-4 py-2" onClick={exp}>Exporter JSON</button>
        <label className="dnd-btn rounded-lg px-4 py-2 cursor-pointer">
          Importer JSON
          <input type="file" accept=".json" onChange={imp} className="hidden" />
        </label>
        <button className="dnd-btn dnd-btn-danger rounded-lg px-4 py-2" onClick={()=>{
          if (confirm('Réinitialiser le personnage (perte définitive) ?')) setState(defaultCharacter());
        }}>Réinitialiser</button>
      </div>
    </div>
  );
}

<!-- === PWA : enregistrement du service worker + bannière "mise à jour disponible" === -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // Vérifie une mise à jour à chaque chargement
      reg.update();

      // Détecte un nouveau worker en attente
      function notifyUpdate() {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#b62828 0%,#5e0e0e 100%);color:#f0d480;padding:10px 18px;border:1px solid #8a6420;border-radius:8px;font-family:"Cinzel",serif;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;z-index:9999;box-shadow:0 6px 16px rgba(0,0,0,0.6),inset 0 1px 0 rgba(240,212,128,0.3);';
        banner.textContent = '✦ Mise à jour disponible — Cliquer pour recharger ✦';
        banner.onclick = () => {
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          location.reload();
        };
        document.body.appendChild(banner);
      }

      if (reg.waiting) notifyUpdate();
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw && nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) notifyUpdate();
        });
      });
    }).catch((err) => console.warn('SW registration failed:', err));

    // Recharge automatique quand un nouveau SW prend le contrôle
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}
</script>
